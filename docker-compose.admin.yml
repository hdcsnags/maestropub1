version: '3.9'

name: session74-admin

services:
  adminer:
    image: adminer:4.8.1
    container_name: session74-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: pepa-linha-dark
    networks:
      - admin
      - default

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: session74-redis-commander
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    networks:
      - admin
      - default

networks:
  admin:
    driver: bridge
