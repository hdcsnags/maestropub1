version: "3.9"

services:
  app:
    build:
      context: .
    container_name: session74-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
    volumes:
      - ./:/app
      - /app/node_modules
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
